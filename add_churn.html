{% extends 'index.html' %}
{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
    }

    h2 {
        text-align: center;
        margin-top: 30px;
        color: #333;
    }

    form {
        width: 90%;
        max-width: 500px;
        margin: 30px auto;
        padding: 25px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: #f9f9f9;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    form p {
        margin-bottom: 15px;
    }

    form label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
    }

    form input, form select, form textarea {
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 14px;
        background-color: #fff;
    }

    button[type="submit"] {
        padding: 10px 20px;
        background-color: #0066cc;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        width: 100%;
    }

    button[type="submit"]:hover {
        background-color: #004999;
    }

    @media screen and (max-width: 600px) {
        form {
            padding: 15px;
        }
    }
</style>

<h2>Add Churn Feature</h2>
<form method="POST">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Submit</button>
</form>



{% endblock %}
